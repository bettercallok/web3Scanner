services:
  # ─── Redis (message broker + cache) ──────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL (Database) ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: web3scanner
      POSTGRES_USER: web3scanner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-web3scanner_pass_123}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web3scanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── ChromaDB (vector store for RAG) ─────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # ─── Ollama (open-source LLM host) ───────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull the model on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5-coder:1.5b && wait"]

  # ─── Django Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8004:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./backend:/app
      - scan_tmp:/tmp/web3scanner
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  # ─── Celery Worker ────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./backend:/app
      - scan_tmp:/tmp/web3scanner
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A config worker -l info -c 2 --max-tasks-per-child=2 -Q default,analysis,ai

  # ─── Celery Beat (scheduled tasks) ───────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ─── React Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - VITE_API_BASE_URL=http://localhost:8004
      - VITE_WS_BASE_URL=ws://localhost:8004
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # ─── On-Chain Monitor ─────────────────────────────────────────
  onchain-monitor:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: python manage.py run_onchain_monitor

  # ─── Initial Data Ingestion ───────────────────────────────────
  ingestion:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      chromadb:
        condition: service_started
      ollama:
        condition: service_started
    command: python manage.py ingest_knowledge --source all

volumes:
  chroma_data:
  ollama_data:
  scan_tmp:
  pg_data:
